<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#14161C;
  --raise:#1B1E26;
  --text:#ECE9E1;
  --muted:#7E828F;
  --muted-2:#C3C0B8;
  --line:rgba(255,255,255,.09);
  --line-2:rgba(255,255,255,.16);
  --accent:#C6553F;
  --serif:'Newsreader',Georgia,'Times New Roman',serif;
  --sans:'Inter','Helvetica Neue',Arial,sans-serif;
}
html{-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{font-family:var(--sans);color:var(--text);background:var(--bg);min-height:100vh;min-height:100svh;line-height:1.6;overflow-anchor:none;touch-action:manipulation}
#app{overflow-x:hidden;width:100%}
::selection{background:var(--accent);color:#fff}
.serif{font-family:var(--serif)}

/* ============ SCREEN SHELL ============ */
.screen{min-height:100dvh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 28px}
.screen.entering{animation:screenIn .7s cubic-bezier(.2,.9,.3,1) both}
@keyframes screenIn{from{opacity:0}to{opacity:1}}
.wrap{width:100%;max-width:700px}

/* ============ OPENING TITLE CARD ============ */
.landing{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--bg);padding:28px;transition:opacity .7s cubic-bezier(.2,.9,.3,1)}
.landing.hide{opacity:0;pointer-events:none}
.landing-inner{max-width:900px}
.landing-line{font-family:var(--serif);font-weight:400;font-size:clamp(34px,6.6vw,58px);line-height:1.12;letter-spacing:-.005em;opacity:0;transform:translateY(14px)}
.landing-line1{color:var(--text)}
.landing-line2{color:var(--accent)}
.landing.play .landing-line1{animation:landIn .6s cubic-bezier(.2,.9,.3,1) forwards}
.landing.play .landing-line2{animation:landIn .6s .1s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes landIn{to{opacity:1;transform:none}}

/* ============ LANDING / INTRO ============ */
.hero-rule{width:46px;height:2px;background:var(--accent);margin-bottom:28px;transform-origin:left;opacity:0;animation:ruleIn .9s .05s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes ruleIn{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
.kicker{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-bottom:30px;opacity:0;animation:rise .9s .1s cubic-bezier(.2,.9,.3,1) forwards}
.kicker b{color:var(--text);font-weight:600}
h1.hero{font-family:var(--serif);font-weight:200;font-size:clamp(46px,7.2vw,88px);line-height:.98;letter-spacing:-.02em;opacity:0;animation:rise 1s .24s cubic-bezier(.2,.9,.3,1) forwards}
h1.hero .accent-word{color:var(--accent)}
.lede{margin-top:34px;max-width:54ch;font-family:var(--serif);font-weight:300;font-size:clamp(18px,2.4vw,23px);line-height:1.55;color:var(--muted-2);opacity:0;animation:rise 1s .42s cubic-bezier(.2,.9,.3,1) forwards}
.lede em{font-style:italic;color:var(--text)}
.start{margin-top:50px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;opacity:0;animation:rise 1s .6s cubic-bezier(.2,.9,.3,1) forwards}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.go{font-family:var(--sans);font-size:15px;font-weight:500;letter-spacing:.02em;color:#14161C;background:var(--text);border:none;padding:16px 40px;cursor:pointer;transition:transform .3s cubic-bezier(.2,.9,.3,1),background .3s,color .3s;border-radius:2px}
.go:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
.go:focus-visible{outline:2px solid var(--accent);outline-offset:4px}
.hint{font-size:13px;letter-spacing:.03em;color:var(--muted)}
.hint kbd{font-family:inherit;border:1px solid var(--line-2);border-radius:4px;padding:3px 8px;color:var(--text)}

/* ============ SPLASH (per-scale) ============ */
.splash .kicker{margin-bottom:26px}
.splash-nav{margin-top:44px;justify-content:flex-start;gap:28px}
.demo-back{display:block;margin:18px auto 0;padding-top:8px;text-align:center}
.big{font-family:var(--serif);font-weight:200;font-size:clamp(28px,5vw,38px);line-height:1.22;letter-spacing:-.01em;opacity:0;animation:rise 1s .22s cubic-bezier(.2,.9,.3,1) forwards}
.big em{font-style:italic;color:var(--accent);font-weight:300}
.splash .start{margin-top:44px;animation-delay:.55s}

/* ============ ASSESSMENT ============ */
.assess{justify-content:flex-start;padding-top:0}
.bar{position:fixed;top:0;left:0;height:2px;background:var(--accent);width:0;transition:width .5s cubic-bezier(.2,.9,.3,1);z-index:20}
.count{width:100%;max-width:1100px;padding:40px 0 0;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);display:flex;align-items:baseline;gap:14px}
.count .scale-tag{color:var(--accent)}
.count b{color:var(--text);font-weight:600}
.stage{width:100%;max-width:1100px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 0 40px}
.card{width:100%;max-width:760px}
.card.in{animation:cin .55s cubic-bezier(.2,.9,.3,1) both}
.card.inb{animation:cinb .55s cubic-bezier(.2,.9,.3,1) both}
@keyframes cin{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}
@keyframes cinb{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:none}}

.stem-box{font-size:clamp(24px,3.6vw,34px);line-height:1.3;min-height:4.2em;display:flex;align-items:flex-end;margin-bottom:30px}
.stem{font-family:var(--serif);font-weight:300;font-size:inherit;line-height:inherit;letter-spacing:-.01em;color:var(--text);text-wrap:balance}

.opts{display:flex;flex-direction:column;border-top:1px solid var(--line);width:100%}
.opt{display:block;position:relative;text-align:left;width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:18px 8px 18px 6px;cursor:pointer;transition:color .25s;-webkit-tap-highlight-color:transparent;user-select:none}
.opt .t{display:block;font-family:var(--serif);font-weight:300;font-size:clamp(18px,2.3vw,22px);line-height:1.4;color:#C9C6BE;transition:transform .28s cubic-bezier(.2,.9,.3,1),color .25s;text-wrap:balance}
.opt.on .t{transform:translateX(12px);color:var(--accent)}
@media (hover:hover){.opt:hover .t{transform:translateX(12px);color:var(--text)}.opt.on:hover .t{color:var(--accent)}}
.opt:focus-visible{outline:1px solid var(--accent);outline-offset:-1px}

/* Scale 3: options hug their text and are centered (index34 wrapping rules apply via JS) */
.cardwide{max-width:1100px}
#ppsOpts{margin:0 auto;width:auto;max-width:100%}
#ppsOpts .opt{padding-right:10px}

/* SINS — single-item scale */
.sins-title{font-family:var(--serif);font-weight:300;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.01em;margin-bottom:4px}
.sins-attrib{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted);margin-bottom:26px}
.sins-prompt{font-family:var(--serif);font-weight:300;font-size:18px;color:var(--muted-2);margin-bottom:6px}
.sins-statement{font-family:var(--serif);font-weight:300;font-size:clamp(26px,4vw,36px);color:var(--text);letter-spacing:-.01em;margin-bottom:12px}
.sins-note{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--muted-2);line-height:1.55;margin-bottom:28px;max-width:56ch}
.sins-row{display:flex;gap:0;justify-content:space-between;align-items:flex-start;max-width:560px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:16px 0}
.sins-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px 2px;border:none;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sins-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.sins-num{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1px solid var(--line-2);font-family:var(--serif);font-weight:300;font-size:20px;color:var(--muted-2);transition:.25s}
@media (hover:hover){.sins-btn:hover .sins-num{border-color:var(--text);color:var(--text)}}
.sins-btn.on .sins-num{background:var(--accent);border-color:var(--accent);color:#fff}
.sins-end{font-family:var(--sans);font-size:11px;letter-spacing:.04em;color:var(--muted);text-align:center;line-height:1.35;max-width:9ch}
.sins-btn.on .sins-end{color:var(--text)}
@media (max-width:560px){.sins-num{width:38px;height:38px;font-size:17px}.sins-end{font-size:10px}}

.err{visibility:hidden;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--accent);margin-top:20px;min-height:1.2em}
.err.visible{visibility:visible}
.err::before{content:'\2014\2002'}

.nav{display:flex;justify-content:center;align-items:center;gap:28px;margin-top:34px}
.back{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:14px;cursor:pointer;padding:8px 0;transition:color .25s}
.back:hover{color:var(--text)}
.back::before{content:'\2190\2002'}
.next{font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:.02em;color:#14161C;background:var(--text);border:none;padding:13px 34px;cursor:pointer;border-radius:2px;transition:background .3s,color .3s,transform .3s}
.next:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
.next:focus-visible,.back:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.next::after{content:'\2002\2192'}

/* ============ DEMOGRAPHICS ============ */
.demo .wrap{max-width:480px}
.demo-card{border-top:3px solid var(--line-2);padding-top:26px;animation:screenIn .5s ease}
.demo-card h2{font-family:var(--serif);font-weight:300;font-size:clamp(28px,5vw,38px);letter-spacing:-.01em;margin-bottom:.35rem}
.demo-sub{font-family:var(--serif);font-style:italic;font-weight:300;font-size:18px;color:var(--muted);line-height:1.55;margin-bottom:34px}
.demo-field{margin-bottom:26px}
.demo-field label{display:block;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px}
.demo-field input[type="number"],.demo-field select{width:100%;font-family:var(--serif);font-weight:300;font-size:19px;padding:8px 2px;border:none;border-bottom:1.5px solid var(--line-2);background:transparent;color:var(--text);transition:border-color .2s;outline:none}
.demo-field input[type="number"]::placeholder{color:var(--muted);font-style:italic}
.demo-field input[type="number"]:focus,.demo-field select:focus{border-bottom-color:var(--accent)}
.demo-field select{-webkit-appearance:menulist;appearance:menulist;padding-right:10px}
.demo-field select option{background:var(--raise);color:var(--text)}
.demo-field input[type="number"]{-moz-appearance:textfield}
.demo-field input[type="number"]::-webkit-outer-spin-button,.demo-field input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.yn-row{display:flex;gap:14px;margin-top:6px}
.yn-btn{font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:.03em;padding:10px 26px;border:1px solid var(--line-2);border-radius:2px;background:transparent;color:var(--muted);cursor:pointer;transition:.22s;-webkit-tap-highlight-color:transparent}
.yn-btn:hover{color:var(--text);border-color:var(--text)}
.yn-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.yn-btn:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.demo-error{display:none;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--accent);margin-bottom:18px}
.demo-error::before{content:'\2014\2002'}
.demo-error.visible{display:block}
.demo-submit{width:100%;font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:.04em;padding:16px;border-radius:2px;border:none;cursor:pointer;color:#14161C;background:var(--text);transition:background .3s,color .3s,transform .3s;margin-top:12px}
.demo-submit:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
.demo-submit:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

/* ============ THANK YOU ============ */
.thanks{text-align:center}
.thanks .stamp{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.thanks h1{font-family:var(--serif);font-weight:200;font-size:clamp(34px,6vw,54px);line-height:1.05;letter-spacing:-.02em;margin-bottom:16px}
.thanks p{font-family:var(--serif);font-weight:300;font-size:19px;color:var(--muted-2);line-height:1.6;margin-bottom:32px;max-width:44ch;margin-left:auto;margin-right:auto}

/* ============ DEBRIEF (final page) ============ */
.debrief-screen{justify-content:center}
.debrief-body{max-width:62ch;opacity:0;animation:rise 1s .22s cubic-bezier(.2,.9,.3,1) forwards}
.debrief-body p{font-family:var(--serif);font-weight:300;font-size:clamp(18px,2.3vw,22px);line-height:1.62;color:var(--muted-2);margin-bottom:26px}
.debrief-body p:last-child{margin-bottom:0}
.debrief-readmore{color:var(--muted)}
.debrief-body a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(198,85,63,.4);word-break:break-word;transition:border-color .3s}
.debrief-body a:hover{border-bottom-color:var(--accent)}

/* ============ SUBMIT OVERLAY ============ */
.submitting-overlay{display:none;position:fixed;inset:0;background:rgba(20,22,28,.94);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.submitting-overlay.visible{display:flex}
.spinner{width:38px;height:38px;border:2px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{margin-top:16px;font-family:var(--serif);font-style:italic;color:var(--muted);font-size:16px}

/* ============ RESPONSIVE ============ */
@media (max-width:640px){
  .screen{padding:32px 20px}
  .opt{padding:15px 26px 15px 2px}
  .opt .t{font-size:17px}
  .stem-box{font-size:22px}
  .count{padding-top:30px}
  .nav{gap:20px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-delay:0ms!important;transition-duration:.01ms!important}
  .hero-rule,.kicker,h1.hero,.lede,.start,.big,}
</style>
</head>
<body>
<div id="landing" class="landing"><div class="landing-inner"><div class="landing-line landing-line1 serif">a slightly unusual</div><div class="landing-line landing-line2 serif">personality test</div></div></div>
<div id="app"></div>
<div class="submitting-overlay" id="submitting"><div class="spinner"></div><div class="spinner-text" id="spinnerText"></div></div>
<script>
const GOOGLE_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwBNB72OELh28ZEfEQaTLaqC6co2OHjxpiiUoPNDaRdufa732wqC570op7DNqJgfo7LJA/exec';

// ===================== DATA =====================
// Scale 1 (standard Likert, 4-point). Scale 2 (standard Likert, 5-point).
// Scale 3 uses the EXPANDED / EXTENDED response format (Zhang & Savalei, 2016):
// each item is a set of 5 first-person statements {v: score 0-4, t: text}, shown
// in a fixed display order. Scoring uses .v, never the display index.
var TRIPM_ITEMS=[{"id": "MEAN5sensitivetofeelings", "factor": "Meanness", "text": "I am sensitive to the feelings of others."}, {"id": "DIS1problemsatwork", "factor": "Disinhibition", "text": "I have had problems at work because I was irresponsible."}, {"id": "BOLD1bornleader", "factor": "Boldness", "text": "I'm a born leader."}, {"id": "MEAN2notmuchsympathy", "factor": "Meanness", "text": "I don't have much sympathy for people."}, {"id": "BOLD2convincepeople", "factor": "Boldness", "text": "I can convince people to do what I want."}, {"id": "BOLD3dontthinkimtalented", "factor": "Boldness", "text": "I don’t think of myself as talented."}, {"id": "DIS2lostafriendirresponsible", "factor": "Disinhibition", "text": "I have lost a friend because of irresponsible things I've done."}, {"id": "MEAN3seesomeoneinpain", "factor": "Meanness", "text": "It doesn’t bother me to see someone else in pain."}, {"id": "BOLD4functionwell", "factor": "Boldness", "text": "I function well in new situations, even when unprepared."}, {"id": "DIS3lackofselfcontrol", "factor": "Disinhibition", "text": "Others have told me they are concerned about my lack of self-control."}, {"id": "MEAN4sympathisewithothers", "factor": "Meanness", "text": "I sympathize with others’ problems."}, {"id": "BOLD5dontliketotakelead", "factor": "Boldness", "text": "I don’t like to take the lead in groups."}, {"id": "DIS4jumpintothings", "factor": "Disinhibition", "text": "I jump into things without thinking."}, {"id": "MEAN1nopointinworryingabouthurt", "factor": "Meanness", "text": "I don't see any point in worrying if what I do hurts someone else."}, {"id": "BOLD6notgoodatinfluencing", "factor": "Boldness", "text": "I am not very good at influencing people."}, {"id": "DIS5impulsivedecisionslovedones", "factor": "Disinhibition", "text": "My impulsive decisions have caused problems with loved ones."}, {"id": "BOLD7stackupwell", "factor": "Boldness", "text": "I don\u2019t stack up well against most others."}, {"id": "V function slideClass(){return state.slideDir==='bwd'?'inb':'in';}

// Progress within the current scale (index34-style per-test bar)
function scaleProgress(idx){
  var sc=SCREENS[idx];var sec=(sc&&typeof sc.section==='number')?sc.section:0;
  var lst=SECTIONS[sec]||[];var pos=lst.indexOf(idx);
  if(pos<0)return {sec:sec,pos:0,len:lst.length,pct:0,num:0};
  return {sec:sec,pos:pos,len:lst.length,pct:Math.round(((pos+1)/lst.length)*100),num:pos+1};
}

function render(){
  var app=document.getElementById('app');
  var idx=state.currentPage;var s=SCREENS[idx];var html='';
  if(s.type==='splash')html=renderSplash(s);
  else if(s.type==='likert')html=renderLikert(s);
  else if(s.type==='pps')html=renderPPSItem(s);
  else if(s.type==='sins')html=renderSINS();
  else if(s.type==='demographics')html=renderDemographics();
  else if(s.type==='debrief')html=renderDebrief();
  app.innerHTML=html;attachListeners();
  if(s.type==='pps'){requestAnimationFrame(sizeOptions);if(document.fonts&&document.fonts.ready)document.fonts.ready.then(function(){if(SCREENS[state.currentPage]&&SCREENS[state.currentPage].type==='pps')sizeOptions();});}
  if(s.type==='debrief'){clearProgress();}
  window.scrollTo(0,0);
  saveProgress();
}

// ---- index34 wrapping rules (Scale 3 only): options hug text and wrap in unison ----
function sizeOptions(){
  var opts=document.getElementById('ppsOpts'); if(!opts)return;
  var t0=opts.querySelector('.t'); var opt0=opts.querySelector('.opt'); if(!t0)return;
  var cs=getComputedStyle(t0), ocs=getComputedStyle(opt0);
  var PAD=Math.ceil(parseFloat(ocs.paddingLeft)+parseFloat(ocs.paddingRight));
  var lh=Math.round(parseFloat(cs.fontSize)*1.4);
  var m=sizeOptions._m||(sizeOptions._m=document.createElement('span'));
  m.style.cssText='position:absolute;left:-99999px;top:0;white-space:nowrap;visibility:hidden';
  ['fontFamily','fontSize','fontWeight','fontStyle','letterSpacing'].forEach(function(p){m.style[p]=cs[p];});
  if(!m.parentNode)document.body.appendChild(m);
  var texts=[].slice.call(opts.querySelectorAll('.t'));
  var maxText=0;
  texts.forEach(function(el){m.textContent=el.textContent;if(m.offsetWidth>maxText)maxText=m.offsetWidth;});
  maxText=Math.ceil(maxText);
  var oneLine=maxText+PAD+2;
  var available=window.innerWidth-40;
  opts.style.width='';
  if(available>=oneLine){opts.style.width=oneLine+'px';equalize();return;}
  var linesOf=function(el){return Math.round(el.scrollHeight/lh);};
  var counts=function(){return texts.map(linesOf);};
  var isUniform=function(){var c=counts();return Math.min.apply(null,c)===Math.max.apply(null,c);};
  var allWrapped=function(){return Math.min.apply(null,counts())>=2;};
  var found=null,mode='u',W;
  for(W=available;W>=150;W-=6){opts.style.width=W+'px';if(isUniform()){found=W;break;}}
  if(found===null){mode='w';for(W=available;W>=110;W-=6){opts.style.width=W+'px';if(allWrapped()){found=W;break;}}if(found===null)found=110;}
  opts.style.width=found+'px';
  var maxLine=0;
  texts.forEach(function(el){var r=document.createRange();r.selectNodeContents(el);var rects=r.getClientRects();for(var i=0;i<rects.length;i++)if(rects[i].width>maxLine)maxLine=rects[i].width;});
  var box=Math.ceil(maxLine)+PAD; opts.style.width=box+'px';
  var ok=function(){return mode==='u'?isUniform():allWrapped();};
  var g=0; while(g++<80&&box<found&&!ok()){box+=6;opts.style.width=box+'px';}
  equalize();
}
function equalize(){
  var o=[].slice.call(document.querySelectorAll('#ppsOpts .opt'));
  o.forEach(function(e){e.style.height='auto';});
  var h=0;o.forEach(function(e){if(e.offsetHeight>h)h=e.offsetHeight;});
  o.forEach(function(e){e.style.height=h+'px';});
}

// ---- Navigation ----
function recordPageTime(){var st=state.pageStartTimes[state.currentPage];if(st)state.pageTimes[state.currentPage]=Math.round((Date.now()-st)/100)/10;state.pageStartTimes[state.currentPage]=Date.now();}
function showItemError(msg){var err=document.getElementById('itemError');if(err){if(msg)err.textContent=msg;err.classList.add('visible');}}

function currentResponseId(s){
  if(s.type==='likert'||s.type==='pps')return s.item.id;
  if(s.type==='sins')return 'SINS1';
  return null;
}

function goNext(){
  var idx=state.currentPage;var s=SCREENS[idx];
  var rid=currentResponseId(s);
  if(rid!==null && state.responses[rid]===undefined){showItemError();return;}
  if(!state.startTime)state.startTime=Date.now();
  recordPageTime();
  if(idx===LAST_ANSWERABLE && !state.endTime)state.endTime=Date.now();
  state.slideDir='fwd';
  state.currentPage++;
  state.pageStartTimes[state.currentPage]=Date.now();
  render();
}
function goBack(){
  if(state.currentPage<=0)return;
  recordPageTime();
  state.slideDir='bwd';
  state.currentPage--;
  state.pageStartTimes[state.currentPage]=Date.now();
  render();
}

function attachListeners(){
  var bs=document.getElementById('btnStart');
  if(bs)bs.addEventListener('click',function(){goNext();});
  var bn=document.getElementById('btnNext');
  if(bn)bn.addEventListener('click',function(){goNext();});
  var bb=document.getElementById('btnBack');
  if(bb)bb.addEventListener('click',function(){goBack();});
  var bds=document.getElementById('btnDemoSubmit');
  if(bds)bds.addEventListener('click',function(){submitFinal();});

  var demoAge=document.getElementById('demoAge');
  if(demoAge)demoAge.addEventListener('input',function(){state.demoFields.age=demoAge.value;saveProgress();var e=document.getElementById('demoError');if(e)e.classList.remove('visible')});
  var demoCountry=document.getElementById('demoCountry');
  if(demoCountry)demoCountry.addEventListener('change',function(){state.demoFields.country=demoCountry.value;saveProgress();var e=document.getElementById('demoError');if(e)e.classList.remove('visible')});
  var dg=document.getElementById('demoGender');
  if(dg)dg.addEventListener('change',function(){state.demoFields.gender=dg.value;saveProgress();var e=document.getElementById('demoError');if(e)e.classList.remove('visible')});

  document.querySelectorAll('.yn-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var grp=btn.getAttribute('data-yn'),val=btn.getAttribute('data-val');
      state.demoYN[grp]=val;
      document.querySelectorAll('.yn-btn[data-yn="'+grp+'"]').forEach(function(o){o.classList.toggle('selected',o===btn);});
      saveProgress();
      var e=document.getElementById('demoError');if(e)e.classList.remove('visible');
    });
  });

  // selectable option buttons
  document.querySelectorAll('.opt, .sins-btn').forEach(function(opt){
    opt.addEventListener('click',function(){
      var itemId=opt.dataset.item,value=parseInt(opt.dataset.value);
      if(state.responses[itemId]===value){
        delete state.responses[itemId];
        opt.classList.remove('on');opt.setAttribute('aria-checked','false');
        saveProgress();return;
      }
      state.responses[itemId]=value;
      document.querySelectorAll('.opt[data-item="'+itemId+'"], .sins-btn[data-item="'+itemId+'"]').forEach(function(o){o.classList.remove('on');o.setAttribute('aria-checked','false');});
      opt.classList.add('on');opt.setAttribute('aria-checked','true');
      var err=document.getElementById('itemError');if(err)err.classList.remove('visible');
      saveProgress();
      if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();
    });
    opt.addEventListener('touchend',function(){try{if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();}catch(e){}},{passive:true});
  });
}

// ---- Keyboard: number keys pick, Enter advances, ArrowLeft goes back ----
document.addEventListener('keydown',function(e){
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  var s=SCREENS[state.currentPage];if(!s)return;
  var tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  if((s.type==='likert'||s.type==='pps'||s.type==='sins')&&e.key>='1'&&e.key<='9'){
    var n=parseInt(e.key)-1;var opts=document.querySelectorAll('.opt, .sins-btn');
    if(opts[n]){e.preventDefault();opts[n].click();}
    return;
  }
  if(e.key==='ArrowLeft'){e.preventDefault();goBack();return;}
  if(e.key==='Enter'&&!e.shiftKey){
    if(tag==='BUTTON')return;
    var ids=['btnStart','btnNext','btnDemoSubmit'];
    for(var i=0;i<ids.length;i++){var b=document.getElementById(ids[i]);if(b){e.preventDefault();b.click();return;}}
  }
});

// ---- Swipe navigation (mobile): left = forward (gated), right = back ----
(function(){
  var sx=0,sy=0,st=0,tracking=false;
  var SWIPE_TYPES={likert:1,pps:1,sins:1};
  function canSwipe(){var s=SCREENS[state.currentPage];if(window.visualViewport&&window.visualViewport.scale>1.01)return false;return !!(s&&SWIPE_TYPES[s.type]);}
  document.addEventListener('touchstart',function(e){
    if(e.touches.length!==1){tracking=false;return;}
    var t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();tracking=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!tracking)return;tracking=false;
    if(!canSwipe())return;
    var t=e.changedTouches&&e.changedTouches[0];if(!t)return;
    var dx=t.clientX-sx,dy=t.clientY-sy,dt=Date.now()-st;
    var adx=Math.abs(dx),ady=Math.abs(dy);
    if(adx<60)return;
    if(adx<ady*1.5)return;
    if(dt>800)return;
    if(dx<0)goNext();else goBack();
  },{passive:true});
})();

function submitToSheet(payload,callback){
  if(!GOOGLE_SCRIPT_URL||GOOGLE_SCRIPT_URL==='YOUR_GOOGLE_SCRIPT_URL_HERE'){callback();return;}
  try{
    var iframe=document.createElement('iframe');iframe.name='sf_'+Date.now();iframe.style.display='none';document.body.appendChild(iframe);
    var form=document.createElement('form');form.method='POST';form.action=GOOGLE_SCRIPT_URL;form.target=iframe.name;form.style.display='none';
    var input=document.createElement('input');input.type='hidden';input.name='payload';input.value=JSON.stringify(payload);
    form.appendChild(input);document.body.appendChild(form);form.submit();
    setTimeout(function(){try{document.body.removeChild(form);document.body.removeChild(iframe)}catch(e){}callback()},2000);
  }catch(err){callback();}
}

function buildPayload(demos){
  var p={};
  p.timestamp=new Date().toISOString();
  p.respondent_id=state.respondentId;
  p.section='complete';
  var tt=(state.endTime&&state.startTime)?Math.round((state.endTime-state.startTime)/100)/10:0;
  p.total_time_seconds=tt;
  p.ip_address=state.ipData.ip||'';
  p.ip_country=state.ipData.country||'';
  p.ip_city=state.ipData.city||'';
  p.isp=state.ipData.isp||'';
  p.is_vpn_or_proxy=state.ipData.is_vpn?'YES':'NO';
  p.demo_age=demos&&demos.age!==undefined?demos.age:'';
  p.demo_gender=demos?demos.gender||'':'';
  p.demo_country=demos?demos.country||'':'';
  p.demo_accurate=demos?demos.accurate||'':'';
  p.demo_consent=demos?demos.consent||'':'';
  // Scale 1 (Triarchic) in test order
  TRIPM_ITEMS.forEach(function(it){p[it.id]=state.responses[it.id]!==undefined?state.responses[it.id]:'';});
  // Scale 2 (SRP) in test order
  SRP_ITEMS.forEach(function(it){p[it.id]=state.responses[it.id]!==undefined?state.responses[it.id]:'';});
  // Scale 3 (extended format) grouped by factor, test order within factor
  ['INT','AFF','LIF','ANT'].forEach(function(f){
    S1_ITEMS.forEach(function(it){if(it.factor===f)p[it.id]=state.responses[it.id]!==undefined?state.responses[it.id]:'';});
  });
  // Scale 4 (SINS), 1-7
  p['SINS1']=state.responses['SINS1']!==undefined?state.responses['SINS1']:'';
  // Per-item time columns, in overall test order
  ANSWERABLE.forEach(function(si){
    var s=SCREENS[si];var id=(s.type==='sins')?'SINS1':s.item.id;
    p['Time'+id]=state.pageTimes[si]||0;
  });
  p.auth_token=generateToken(state.respondentId);
  return p;
}

  var countryEl=document.getElementById('demoCountry');
  var age=ageEl?ageEl.value.trim():'';
  var gender=genderEl?genderEl.value:'';
  var country=countryEl?countryEl.value:'';
  var accurate=state.demoYN.accurate;
  var consent=state.demoYN.consent;
  var errEl=document.getElementById('demoError');
  if(!age||isNaN(parseInt(age))||parseInt(age)<13||parseInt(age)>120){if(errEl){errEl.textContent='Please enter a valid age (13\u2013120).';errEl.classList.add('visible')}return;}
  if(!gender){if(errEl){errEl.textContent='Please select your gender.';errEl.classList.add('visible')}return;}
  if(!country){if(errEl){errEl.textContent='Please select your country.';errEl.classList.add('visible')}return;}
  if(!accurate){if(errEl){errEl.textContent='Please answer whether your answers were accurate.';errEl.classList.add('visible')}return;}
  if(!consent){if(errEl){errEl.textContent='Please answer the consent question.';errEl.classList.add('visible')}return;}
  if(errEl)errEl.classList.remove('visible');
  var overlay=document.getElementById('submitting');
  var spin=document.getElementById('spinnerText');if(spin)spin.textContent='Submitting your responses\u2026';
  if(overlay)overlay.classList.add('visible');
  var payload=buildPayload({age:parseInt(age),gender:gender,country:country,accurate:accurate,consent:consent});
  submitToSheet(payload,function(){
    if(overlay)overlay.classList.remove('visible');
    state.slideDir='fwd';
    state.currentPage=DEBRIEF_INDEX;
    render();
  });
}

// ---- Silent progress saving (survives reloads / tab eviction) ----
var SAVE_KEY='pps_progress_v2';
var SAVE_TTL=12*60*60*1000;
function saveProgress(){
  try{
    var sc=SCREENS[state.currentPage];
    if(!sc||sc.type==='debrief')return;
    if(state.currentPage<=0)return;
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      t:Date.now(), currentPage:state.currentPage, responses:state.responses,
      demoYN:state.demoYN, demoFields:state.demoFields, startTime:state.startTime,
      endTime:state.endTime, pageTimes:state.pageTimes, pageStartTimes:state.pageStartTimes,
      respondentId:state.respondentId
    }));
  }catch(e){}
}
function clearProgress(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
function restoreProgress(){
  try{
    var raw=localStorage.getItem(SAVE_KEY); if(!raw)return false;
    var b=JSON.parse(raw); if(!b||typeof b.currentPage!=='number')return false;
    if(SAVE_TTL&&b.t&&(Date.now()-b.t)>SAVE_TTL){clearProgress();return false;}
    if(b.currentPage<=0||b.currentPage>=DEBRIEF_INDEX){clearProgress();return false;}
    state.currentPage=b.currentPage;
    state.responses=b.responses||{};
    state.demoYN=b.demoYN||{accurate:null,consent:null};
    state.demoFields=b.demoFields||{age:'',gender:'',country:''};
    state.startTime=b.startTime||null;
    state.endTime=b.endTime||null;
    state.pageTimes=b.pageTimes||[];
    state.pageStartTimes=b.pageStartTimes||[];
    if(b.respondentId)state.respondentId=b.respondentId;
    state.pageStartTimes[state.currentPage]=Date.now();
    return true;
  }catch(e){return false;}
}
window.addEventListener('pagehide',saveProgress);
window.addEventListener('beforeunload',saveProgress);
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')saveProgress();});

// Opening title card: shows for ~1s, then smoothly cross-fades into the first
// splash screen (whose own entrance animation plays as the card fades out).
function playLanding(){
  var el=document.getElementById('landing');
  if(!el){render();return;}
  requestAnimationFrame(function(){el.classList.add('play');});
  setTimeout(function(){
    render();
    el.classList.add('hide');
    var done=function(){if(el&&el.parentNode)el.parentNode.removeChild(el);};
    el.addEventListener('transitionend',done,{once:true});
    setTimeout(done,900);
  },1000);
}
function boot(){
  var restored=restoreProgress();
  var el=document.getElementById('landing');
  if(!restored && state.currentPage===0){
    playLanding();
  }else{
    if(el&&el.parentNode)el.parentNode.removeChild(el);
    render();
  }
}
// Hold the very first paint until webfonts are ready, so the opening screen
// doesn't visibly reflow when Newsreader/Inter swap in. Fallback after 2s.
if(document.fonts&&document.fonts.ready){
  var _booted=false;
  var _go=function(){if(_booted)return;_booted=true;boot();};
  document.fonts.ready.then(_go);
  setTimeout(_go,2000);
}else{
  boot();
}
</script>
